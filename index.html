<meta charset="utf-8">
<title>Big ball ⚽️ 🇲🇽 🇺🇸 🇨🇦</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171c24; --ink:#e8edf2; --muted:#8b97a6;
    --grid:#252c36; --accent:#e8453c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:1040px;margin:0 auto;padding:28px 20px 64px}
  header h1{font-size:1.6rem;margin:0 0 4px;letter-spacing:-.02em}
  header p{color:var(--muted);margin:0 0 24px;font-size:.95rem}
  .card{background:var(--panel);border:1px solid var(--grid);border-radius:14px;padding:18px}
  .chart-box{position:relative;width:100%;overflow-x:auto}
  svg{display:block;width:100%;height:auto}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
  .chip{display:flex;align-items:center;gap:7px;padding:5px 11px;border:1px solid var(--grid);
    border-radius:999px;cursor:pointer;font-size:.85rem;user-select:none;transition:opacity .15s,background .15s}
  .chip:hover{background:#1f2630}
  .chip.off{opacity:.38}
  .swatch{width:12px;height:12px;border-radius:50%;flex:0 0 auto}
  .tt{position:absolute;pointer-events:none;background:#0b0e12;border:1px solid var(--grid);
    border-radius:10px;padding:10px 12px;font-size:.82rem;opacity:0;transition:opacity .1s;
    transform:translate(-50%,-50%);white-space:nowrap;z-index:5;box-shadow:0 8px 24px rgba(0,0,0,.45)}
  .tt b{color:var(--accent)}
  .tt .row{display:flex;justify-content:space-between;gap:14px;margin-top:3px;color:var(--muted)}
  .tt .row span:last-child{color:var(--ink);font-variant-numeric:tabular-nums}
  footer{color:var(--muted);font-size:.8rem;margin-top:18px;text-align:center}
  line.hover{stroke:var(--muted);stroke-dasharray:3 3;opacity:.5}

  /* corrida de cavalos */
  .controls{margin-top:24px;display:flex;justify-content:flex-end}
  .btn{display:inline-flex;align-items:center;gap:6px;background:#171c24;color:#e8edf2;
    border:1px solid #252c36;border-radius:8px;padding:8px 14px;font-size:.85rem;
    font-weight:600;cursor:pointer;transition:background .15s}
  .btn:hover{background:#1f2630}
  .btn:active{transform:translateY(1px)}
  .race{position:relative;margin-top:12px;margin-bottom:22px;padding:16px 16px;
    border-radius:14px;overflow:hidden;
    background:#bb4a2c;
    background-image:linear-gradient(180deg,rgba(255,255,255,.07),rgba(0,0,0,.14));
    box-shadow:inset 0 0 0 4px rgba(255,255,255,.85),0 6px 22px rgba(0,0,0,.35)}
  /* linha de largada */
  .race::before{content:"";position:absolute;top:0;bottom:0;left:9%;
    border-left:3px solid rgba(255,255,255,.7);z-index:0}
  .day-label{position:relative;z-index:2;text-align:right;font-size:.82rem;font-weight:700;
    color:#fff;font-variant-numeric:tabular-nums;margin-bottom:8px;min-height:1.1em;padding-right:6px;
    text-shadow:0 1px 2px rgba(0,0,0,.35)}
  .lane{position:relative;height:74px;border-bottom:3px solid rgba(255,255,255,.85)}
  .lane:first-of-type{border-top:3px solid rgba(255,255,255,.85)}
  .lane:last-child{border-bottom:3px solid rgba(255,255,255,.85)}
  .runner{position:absolute;top:50%;left:8%;transform:translate(-50%,-50%);
    display:flex;flex-direction:row;align-items:center;gap:6px;z-index:1;
    transition:left .8s cubic-bezier(.33,.1,.3,1)}
  .runner img{height:72px;width:auto;display:block;cursor:pointer}
  .runner .sc{background:#fff;color:#000;border-radius:4px;padding:2px 8px;
    font-size:.74rem;font-weight:900;font-variant-numeric:tabular-nums;
    box-shadow:0 1px 4px rgba(0,0,0,.35)}

  /* modal de imagem */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;
    align-items:center;justify-content:center;padding:24px;z-index:50;cursor:zoom-out}
  .modal.open{display:flex}
  .modal img{max-width:90vw;max-height:88vh;width:auto;height:auto;
    border-radius:10px;cursor:default}
  .modal .close{position:absolute;top:16px;right:20px;color:#e8edf2;font-size:30px;
    line-height:1;cursor:pointer;opacity:.8}
  .modal .close:hover{opacity:1}
</style>

<div class="wrap">
  <header>
    <h1>Big ball ⚽️ 🇲🇽 🇺🇸 🇨🇦</h1>
  </header>

  <div class="controls">
    <button class="btn" onclick="drawRace()">↻ Reiniciar corrida</button>
  </div>

  <div class="race" id="race"></div>

  <div class="card">
    <div class="chart-box" id="box">
      <svg id="chart" viewBox="0 0 960 520" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="tt" id="tt"></div>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<div class="modal" id="modal">
  <span class="close">&times;</span>
  <img id="modalImg" alt="">
</div>

<script>
const CSV_FILE = "daily_score.csv";
const COLORS = ["#e8453c","#f5a623","#f8e71c","#7ed321","#27c4a0","#4a90e2",
  "#9b6cf2","#e668c4","#b8e986","#50b8d8","#ff8a5c"];

// data-dependent state, preenchido após carregar o CSV
let DAYS=[], SERIES=[], maxY=0;

const W=960,H=520, M={t:24,r:96,b:46,l:96};
const iw=W-M.l-M.r, ih=H-M.t-M.b;
const X=i=>M.l+(iw*i/(DAYS.length-1));
const Y=v=>M.t+ih-(ih*v/maxY);

// nome -> slug do arquivo de imagem (minúsculo, sem acento, mantém espaços)
function slug(name){
  return name.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase().trim();
}
// define a imagem de cada participante; os dois "Matheus" recebem
// aleatoriamente uma das duas imagens a cada carregamento
function assignImages(series){
  const pool=["matheus.png","matheus 2.png"];
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  let mi=0;
  series.forEach(s=>{
    const base=slug(s.name.replace(/\s*\(\d+\)\s*$/,""));
    s.imgFile = base==="matheus" ? (pool[mi++]||"matheus.png") : slug(s.name)+".png";
  });
}

// "2026-06-11" -> "11/06"
function fmtDate(s){
  const m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}/${m[2]}` : s;
}

// lê e interpreta o CSV (separado por ; com BOM e coluna Total ao final)
function parseCSV(text){
  text=text.replace(/^﻿/,"").trim();
  const lines=text.split(/\r?\n/).filter(l=>l.trim()!=="");
  const header=lines[0].split(";").map(c=>c.trim());
  // colunas de data = tudo entre "Participante" e "Total"
  const lastIsTotal=/total/i.test(header[header.length-1]);
  const dateCols=header.slice(1, lastIsTotal?-1:undefined);
  DAYS=dateCols.map(fmtDate);

  const seen={};
  const series=lines.slice(1).map((line,i)=>{
    const cells=line.split(";").map(c=>c.trim());
    let name=cells[0];
    if(seen[name]) name=`${name} (${++seen[name]})`; else seen[name]=1;
    const daily=cells.slice(1,1+dateCols.length).map(v=>parseFloat(v)||0);
    let s=0; const cum=daily.map(v=>s+=v);
    return {name, cum, total:s, color:COLORS[i%COLORS.length], on:false};
  });
  // ativar por padrão apenas os 3 primeiros colocados (maiores totais)
  [...series].sort((a,b)=>b.total-a.total).slice(0,3).forEach(s=>s.on=true);
  return series;
}

const svg=document.getElementById("chart");
const NS="http://www.w3.org/2000/svg";
const el=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};

// modal de imagem (mesma aba)
const modal=document.getElementById("modal"), modalImg=document.getElementById("modalImg");
function openModal(src,alt){modalImg.src=src;modalImg.alt=alt||"";modal.classList.add("open");}
function closeModal(){modal.classList.remove("open");modalImg.removeAttribute("src");}
modal.addEventListener("click",e=>{if(e.target!==modalImg)closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

function draw(){
  svg.innerHTML="";
  // y grid + labels
  for(let v=0;v<=maxY;v+=20){
    svg.appendChild(el("line",{x1:M.l,y1:Y(v),x2:W-M.r,y2:Y(v),stroke:"#252c36","stroke-width":1}));
    const t=el("text",{x:M.l-10,y:Y(v)+4,fill:"#8b97a6","font-size":12,"text-anchor":"end"});
    t.textContent=v; svg.appendChild(t);
  }
  // x labels
  DAYS.forEach((d,i)=>{
    const t=el("text",{x:X(i),y:H-M.b+22,fill:"#8b97a6","font-size":12,"text-anchor":"middle"});
    t.textContent=d; svg.appendChild(t);
  });
  // hover guide line
  const guide=el("line",{class:"hover",x1:0,y1:M.t,x2:0,y2:M.t+ih,opacity:0});
  svg.appendChild(guide);
  // lines
  SERIES.forEach(s=>{
    if(!s.on) return;
    const pts=s.cum.map((v,i)=>`${X(i)},${Y(v)}`).join(" ");
    svg.appendChild(el("polyline",{points:pts,fill:"none",stroke:s.color,"stroke-width":2.5,
      "stroke-linejoin":"round","stroke-linecap":"round",opacity:.95}));
    s.cum.forEach((v,i)=>svg.appendChild(el("circle",{cx:X(i),cy:Y(v),r:3,fill:s.color})));
    // end label
    const last=s.cum.length-1;
    const lbl=el("text",{x:X(last)+7,y:Y(s.cum[last])+4,fill:s.color,"font-size":11,"font-weight":600});
    lbl.textContent=s.total; svg.appendChild(lbl);
  });
  bindHover(guide);
}

const tt=document.getElementById("tt"), box=document.getElementById("box");
function bindHover(guide){
  const rect=el("rect",{x:M.l,y:M.t,width:iw,height:ih,fill:"transparent"});
  svg.appendChild(rect);
  rect.addEventListener("mousemove",e=>{
    const r=svg.getBoundingClientRect(), scale=W/r.width;
    const px=(e.clientX-r.left)*scale;
    let i=Math.round((px-M.l)/(iw/(DAYS.length-1)));
    i=Math.max(0,Math.min(DAYS.length-1,i));
    guide.setAttribute("x1",X(i)); guide.setAttribute("x2",X(i)); guide.setAttribute("opacity",1);
    const rows=SERIES.filter(s=>s.on)
      .map(s=>({n:s.name,v:s.cum[i],c:s.color}))
      .sort((a,b)=>b.v-a.v);
    tt.innerHTML=`<b>${DAYS[i]}</b>`+rows.map(x=>
      `<div class="row"><span style="color:${x.c}">●</span><span>${x.n}</span><span>${x.v}</span></div>`).join("");
    tt.style.left=(X(i)/W*r.width)+"px";
    tt.style.top=((M.t+ih/2)/H*r.height)+"px";
    tt.style.opacity=1;
  });
  rect.addEventListener("mouseleave",()=>{tt.style.opacity=0;guide.setAttribute("opacity",0);});
}

// legend
function buildLegend(){
  const lg=document.getElementById("legend");
  lg.innerHTML="";
  SERIES.forEach(s=>{
    const c=document.createElement("div");
    c.className="chip"+(s.on?"":" off");
    c.innerHTML=`<span class="swatch" style="background:${s.color}"></span>${s.name} <b style="color:${s.color};margin-left:2px">${s.total}</b>`;
    c.onclick=()=>{s.on=!s.on;c.classList.toggle("off",!s.on);draw();};
    lg.appendChild(c);
  });
}

// "corrida de cavalos": cada participante avança no eixo X dia a dia,
// conforme a pontuação acumulada até aquele dia
const STEP_MS=850;               // tempo entre os dias da animação
let raceGen=0;                    // cancela animação anterior ao reiniciar
function drawRace(){
  const gen=++raceGen;
  const race=document.getElementById("race");
  race.innerHTML="";
  const sorted=[...SERIES].sort((a,b)=>a.name.localeCompare(b.name,"pt"));
  const maxTotal=Math.max(...SERIES.map(s=>s.total));
  const L=9, R=91;               // largada e chegada (% da largura)
  const pos=v=> maxTotal ? L+(v/maxTotal)*(R-L) : (L+R)/2;

  const label=document.createElement("div");
  label.className="day-label";
  race.appendChild(label);

  const runners=sorted.map(s=>{
    const lane=document.createElement("div"); lane.className="lane";
    const run=document.createElement("div"); run.className="runner";
    run.style.left=L+"%";        // todos na largada
    const src=`img/${encodeURIComponent(s.imgFile)}`;
    run.innerHTML=
      `<img src="${src}" alt="${s.name}" title="${s.name}" `+
      `onclick="openModal(this.src,this.alt)" onerror="this.style.visibility='hidden'">`+
      `<span class="sc">0</span>`;
    lane.appendChild(run);
    race.appendChild(lane);
    return {s, run, sc:run.querySelector(".sc")};
  });

  let d=0;
  function step(){
    if(gen!==raceGen) return;    // uma corrida mais nova começou
    label.textContent=DAYS[d];
    runners.forEach(({s,run,sc})=>{
      run.style.left=pos(s.cum[d])+"%";
      sc.textContent=s.cum[d];
    });
    if(++d<DAYS.length) setTimeout(step, STEP_MS);
  }
  setTimeout(step, 350);
}

function showError(msg){
  svg.innerHTML="";
  const t=el("text",{x:W/2,y:H/2,fill:"#8b97a6","font-size":15,"text-anchor":"middle"});
  t.textContent=msg; svg.appendChild(t);
}

// carrega os dados diretamente do CSV
fetch(CSV_FILE,{cache:"no-store"})
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.text(); })
  .then(text=>{
    SERIES=parseCSV(text);
    assignImages(SERIES);
    maxY=Math.ceil(Math.max(...SERIES.map(s=>s.total))/20)*20;
    buildLegend();
    draw();
    drawRace();
  })
  .catch(()=>showError("Não foi possível carregar "+CSV_FILE+" — sirva a pasta via HTTP (ex.: python3 -m http.server)."));
</script>
